# Dracula - gothic purple, fangs and midnight
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[🦇](bold #BD93F9)"
error_symbol = "[🦇](bold #FF5555)"

[username]
style_user = "bold #8BE9FD"
style_root = "bold #FF5555"
format = "[🧛 $user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #BD93F9"

[directory]
style = "bold #BD93F9"
format = "[⟩ $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bold #FF79C6"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #50FA7B"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚔"
untracked = "?"
ahead = "⇡${count}"
behind = "⇣${count}"
modified = "✦"
staged = "✚"
deleted = "✘"

[nodejs]
symbol = "⬡"
style = "bold #50FA7B"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #F1FA8C"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #FFB86C"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #8BE9FD"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #FF5555"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #6272A4"
