# Poimandres - teal and lavender, calm depth
format = """$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[~>](bold #5DE4C7)"
error_symbol = "[~>](bold #D0679D)"

[username]
disabled = true

[hostname]
disabled = true

[directory]
style = "bold #ADD7FF"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = "◗"
style = "bold #5DE4C7"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #D0679D"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⊘"
untracked = "+"
ahead = "↑${count}"
behind = "↓${count}"
modified = "~"
staged = "•"
deleted = "×"

[nodejs]
symbol = "⬡"
style = "bold #5DE4C7"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FFFAC2"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #D0679D"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #89DDFF"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #D0679D"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "#767C9D"
