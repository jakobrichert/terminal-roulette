# Solarized Dark - scientific precision, Ethan Schoonover's masterpiece
format = """$username$hostname $directory $git_branch$git_status$fill$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[fill]
symbol = " "

[character]
success_symbol = "[::](bold #268BD2)"
error_symbol = "[::](bold #DC322F)"

[username]
style_user = "bold #2AA198"
style_root = "bold #DC322F"
format = "\\[{$user}\\]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style)"
style = "bold #6C71C4"

[directory]
style = "bold #268BD2"
format = "[$path]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = "~"
style = "bold #6C71C4"
format = "[$symbol/$branch]($style) "

[git_status]
style = "bold #859900"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "!!"
untracked = "??"
ahead = "+${count}"
behind = "-${count}"
modified = "M"
staged = "A"
deleted = "D"

[nodejs]
symbol = "⬡"
style = "bold #859900"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #B58900"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #CB4B16"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #2AA198"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #DC322F"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style)"
style = "bold #586E75"
