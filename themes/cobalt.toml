# Cobalt - electric blue on deep navy, bold and bright
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[⊳](bold #00AAFF)"
error_symbol = "[⊳](bold #FF0055)"

[username]
style_user = "bold #FFFFFF"
style_root = "bold #FF0055"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #00AAFF"

[directory]
style = "bold #00AAFF"
format = "[⊲ $path ⊳]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = "⌥"
style = "bold #3AD900"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #FF0055"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚡"
untracked = "◌"
ahead = "⬆${count}"
behind = "⬇${count}"
modified = "✦"
staged = "✚"
deleted = "✘"

[nodejs]
symbol = "⬡"
style = "bold #3AD900"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FFC600"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #FF9D00"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #00AAFF"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #FF0055"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #0050A4"
