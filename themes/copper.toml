# Copper - warm metallic, hammered bronze in firelight
format = """$username$directory$git_branch$git_status$cmd_duration$line_break$character"""

[character]
success_symbol = "[◈](bold #E08A53)"
error_symbol = "[◈](bold #C75646)"

[username]
style_user = "#8A7560"
style_root = "bold #C75646"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
disabled = true

[directory]
style = "bold #E08A53"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = "⌿"
style = "#C8A882"
format = "[$symbol $branch]($style) "

[git_status]
style = "#C75646"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "!"
untracked = "?"
ahead = "+${count}"
behind = "-${count}"
modified = "~"
staged = "+"
deleted = "-"

[nodejs]
symbol = "⬡"
style = "#8EB33B"
format = "[$symbol $version]($style) "

[python]
symbol = "py"
style = "#E0C36D"
format = "[$symbol $version]($style) "

[rust]
symbol = "rs"
style = "#C75646"
format = "[$symbol $version]($style) "

[golang]
symbol = "go"
style = "#72B3B5"
format = "[$symbol $version]($style) "

[java]
symbol = "jv"
style = "#E08A53"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "#5B4D3D"
