# Palenight - dreamy purple moonlit coding
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[☽](bold #C792EA)"
error_symbol = "[☽](bold #F07178)"

[username]
style_user = "bold #C3E88D"
style_root = "bold #F07178"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #89DDFF"

[directory]
style = "bold #82AAFF"
format = "[☾ $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = "⎇"
style = "bold #FFCB6B"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #F07178"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚡"
untracked = "◌"
ahead = "↑${count}"
behind = "↓${count}"
modified = "◐"
staged = "●"
deleted = "○"

[nodejs]
symbol = "⬡"
style = "bold #C3E88D"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FFCB6B"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #F07178"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #89DDFF"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #F07178"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #676E95"
