# Retrowave - 80s arcade neon, chrome and pink
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[▬▶](bold #FF6EC7)"
error_symbol = "[▬▶](bold #FF2E63)"

[username]
style_user = "bold #E0AAFF"
style_root = "bold #FF2E63"
format = "[▰ $user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #06D6A0"

[directory]
style = "bold #0096FF"
format = "[▰ $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = "▸"
style = "bold #FFDF00"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #FF2E63"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "✕"
untracked = "◇"
ahead = "▲${count}"
behind = "▼${count}"
modified = "◈"
staged = "▣"
deleted = "▫"

[nodejs]
symbol = "⬡"
style = "bold #06FF72"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FFDF00"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #FF6EC7"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #06D6A0"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #FF2E63"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #3C3C5A"
