# GitHub Light - clean white, professional developer focus
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[\\$](bold #0969DA)"
error_symbol = "[\\$](bold #CF222E)"

[username]
style_user = "bold #24292F"
style_root = "bold #CF222E"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #8250DF"

[directory]
style = "bold #0969DA"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = ""
style = "bold #953800"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #CF222E"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "!"
untracked = "?"
ahead = "↑${count}"
behind = "↓${count}"
modified = "M"
staged = "A"
deleted = "D"

[nodejs]
symbol = "⬡"
style = "bold #1A7F37"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #953800"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #CF222E"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #0969DA"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #CF222E"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #57606A"
