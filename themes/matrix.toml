# Matrix - green phosphor on black, pure hacker
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[>](bold #00FF41)"
error_symbol = "[>](bold #FF0033)"

[username]
style_user = "#00FF41"
style_root = "bold #FF0033"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style)"
style = "#00FF41"

[directory]
style = "bold #00FF41"
format = "[:$path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "/"

[git_branch]
symbol = "br:"
style = "#00CC33"
format = "[$symbol$branch]($style) "

[git_status]
style = "#00FF41"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "!"
untracked = "?"
ahead = "+${count}"
behind = "-${count}"
modified = "*"
staged = "#"
deleted = "x"

[nodejs]
symbol = "node"
style = "#00CC33"
format = "[$symbol:$version]($style) "

[python]
symbol = "py"
style = "#00CC33"
format = "[$symbol:$version]($style) "

[rust]
symbol = "rs"
style = "#00CC33"
format = "[$symbol:$version]($style) "

[golang]
symbol = "go"
style = "#00CC33"
format = "[$symbol:$version]($style) "

[java]
symbol = "java"
style = "#00CC33"
format = "[$symbol:$version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "#006622"
