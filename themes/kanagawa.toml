# Kanagawa - inspired by Katsushika Hokusai's Great Wave
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[波](bold #7E9CD8)"
error_symbol = "[波](bold #C34043)"

[username]
style_user = "bold #C8C093"
style_root = "bold #C34043"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #957FB8"

[directory]
style = "bold #7E9CD8"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = ""
style = "bold #DCA561"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #E82424"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚔"
untracked = "★"
ahead = "⬆${count}"
behind = "⬇${count}"
modified = "✦"
staged = "✚"
deleted = "✘"

[nodejs]
symbol = "⬡"
style = "bold #76946A"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #DCA561"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #C34043"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #7FB4CA"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #957FB8"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #938AA9"
