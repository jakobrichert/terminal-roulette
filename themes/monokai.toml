# Monokai - classic warm neon on dark
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[❯](bold #A6E22E)"
error_symbol = "[❯](bold #F92672)"

[username]
style_user = "bold #A6E22E"
style_root = "bold #F92672"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #FD971F"

[directory]
style = "bold #66D9EF"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = ""
style = "bold #FD971F"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #F92672"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚔"
untracked = "★"
ahead = "⬆${count}"
behind = "⬇${count}"
modified = "✦"
staged = "✚"
deleted = "✘"

[nodejs]
symbol = "⬡"
style = "bold #A6E22E"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #66D9EF"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #FD971F"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #66D9EF"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #F92672"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #AE81FF"
