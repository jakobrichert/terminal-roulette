# Everforest - soft earthy greens
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[🌿](bold #A7C080)"
error_symbol = "[🌿](bold #E67E80)"

[username]
style_user = "bold #A7C080"
style_root = "bold #E67E80"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #D699B6"

[directory]
style = "bold #7FBBB3"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = ""
style = "bold #DBBC7F"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #E67E80"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚔"
untracked = "★"
ahead = "⬆${count}"
behind = "⬇${count}"
modified = "✦"
staged = "✚"
deleted = "✘"

[nodejs]
symbol = "⬡"
style = "bold #A7C080"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #DBBC7F"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #E67E80"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #83C092"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #E67E80"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #D699B6"
