# Tokyo Night - neon city lights, cool blues and purples
format = """$username$hostname$directory$git_branch$git_status$fill$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold #7AA2F7)"
error_symbol = "[❯](bold #F7768E)"

[username]
style_user = "bold #7DCFFF"
style_root = "bold #F7768E"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #BB9AF7"

[directory]
style = "bold #7AA2F7"
format = "[  $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold #BB9AF7"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold #9ECE6A"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "~"
untracked = "?"
ahead = "^${count}"
behind = "v${count}"
modified = "!"
staged = "+"
deleted = "x"

[nodejs]
symbol = " "
style = "bold #9ECE6A"
format = "[$symbol$version]($style) "

[python]
symbol = " "
style = "bold #E0AF68"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style = "bold #F7768E"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "bold #7DCFFF"
format = "[$symbol$version]($style) "

[java]
symbol = " "
style = "bold #F7768E"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style)"
style = "bold #414868"
