# Cyberpunk - neon pink, cyan, and electric yellow
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[▶](bold #FF00FF)"
error_symbol = "[▶](bold #FF0040)"

[username]
style_user = "bold #00FFFF"
style_root = "bold #FF0040"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #FF00FF"

[directory]
style = "bold #00FFFF"
format = "[░ $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = "⚡"
style = "bold #FFE600"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #FF00FF"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚔"
untracked = "★"
ahead = "⬆${count}"
behind = "⬇${count}"
modified = "✦"
staged = "✚"
deleted = "✘"

[nodejs]
symbol = "⬡"
style = "bold #00FF88"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FFE600"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #FF6600"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #00FFFF"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #FF0040"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #FF00FF"
