# Snow - crisp winter white, cool blue accents
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[❆](bold #5E81AC)"
error_symbol = "[❆](bold #BF616A)"

[username]
style_user = "bold #4C566A"
style_root = "bold #BF616A"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #5E81AC"

[directory]
style = "bold #2E3440"
format = "[❄ $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bold #5E81AC"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #BF616A"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "!"
untracked = "◌"
ahead = "↑${count}"
behind = "↓${count}"
modified = "●"
staged = "◉"
deleted = "○"

[nodejs]
symbol = "⬡"
style = "bold #A3BE8C"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #EBCB8B"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #D08770"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #5E81AC"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #BF616A"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #4C566A"
