# Laserwave - hot pink laser on dark violet
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[⟫](bold #FF52BF)"
error_symbol = "[⟫](bold #F62B5A)"

[username]
style_user = "bold #B4DEFF"
style_root = "bold #F62B5A"
format = "[⟪$user⟫]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #FF52BF"

[directory]
style = "bold #FFE261"
format = "[⟪$path⟫]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = "⟁"
style = "bold #40B4C4"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #F62B5A"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚡"
untracked = "⟐"
ahead = "⟰${count}"
behind = "⟱${count}"
modified = "⟐"
staged = "⊞"
deleted = "⊟"

[nodejs]
symbol = "⬡"
style = "bold #40B4C4"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FFE261"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #FF52BF"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #40B4C4"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #F62B5A"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #7B6995"
