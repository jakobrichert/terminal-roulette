# Synthwave '84 - neon sunset, hot chrome
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[▹▸](bold #FF7EDB)"
error_symbol = "[▹▸](bold #FE4450)"

[username]
style_user = "bold #72F1B8"
style_root = "bold #FE4450"
format = "[« $user »]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #FF7EDB"

[directory]
style = "bold #36F9F6"
format = "[▸ $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = "♪"
style = "bold #FF7EDB"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #72F1B8"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚡"
untracked = "★"
ahead = "⬆${count}"
behind = "⬇${count}"
modified = "♫"
staged = "✚"
deleted = "✘"

[nodejs]
symbol = "⬡"
style = "bold #72F1B8"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FEDE5D"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #FE4450"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #36F9F6"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #FF8B39"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #848BBD"
