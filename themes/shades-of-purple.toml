# Shades of Purple - bold, loud, unapologetically purple
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[»](bold #FAD000)"
error_symbol = "[»](bold #EC3A37)"

[username]
style_user = "bold #FAD000"
style_root = "bold #EC3A37"
format = "[⟦$user⟧]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #A599E9"

[directory]
style = "bold #A599E9"
format = "[⟦$path⟧]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = "⚡"
style = "bold #FAD000"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #EC3A37"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚔"
untracked = "★"
ahead = "⬆${count}"
behind = "⬇${count}"
modified = "✦"
staged = "✚"
deleted = "✘"

[nodejs]
symbol = "⬡"
style = "bold #80CBC4"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FAD000"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #FF9D00"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #80CBC4"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #EC3A37"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #4D21AF"
