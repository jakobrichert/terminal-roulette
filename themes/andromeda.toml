# Andromeda - deep space, distant galaxy purples and reds
format = """$username$hostname$directory$git_branch$git_status$fill$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[fill]
symbol = "⋅"
style = "#2E2436"

[character]
success_symbol = "[⊹](bold #EE5D43)"
error_symbol = "[⊹](bold #FC644D)"

[username]
style_user = "bold #D5CED9"
style_root = "bold #FC644D"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #C74DED"

[directory]
style = "bold #00E8C6"
format = "[⊕ $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = "⊛"
style = "bold #FFE66D"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #FC644D"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⊗"
untracked = "⊕"
ahead = "⇡${count}"
behind = "⇣${count}"
modified = "⊙"
staged = "⊛"
deleted = "⊘"

[nodejs]
symbol = "⬡"
style = "bold #00E8C6"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FFE66D"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #EE5D43"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #00E8C6"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #C74DED"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style)"
style = "#665B77"
