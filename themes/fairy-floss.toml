# Fairy Floss - whimsical candy pastels on purple
format = """$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[character]
success_symbol = "[✿](bold #FFB8D1)"
error_symbol = "[✿](bold #FF857F)"

[username]
style_user = "bold #C2FFDF"
style_root = "bold #FF857F"
format = "[✩ $user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #FFB8D1"

[directory]
style = "bold #C5A3FF"
format = "[❀ $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = "❁"
style = "bold #FFF352"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #FF857F"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "✕"
untracked = "✩"
ahead = "↑${count}"
behind = "↓${count}"
modified = "✎"
staged = "✔"
deleted = "✕"

[nodejs]
symbol = "⬡"
style = "bold #C2FFDF"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #FFF352"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #FF857F"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #C2FFDF"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #FFB8D1"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold #796E8A"
