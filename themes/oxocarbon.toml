# Oxocarbon - IBM Carbon Design, geometric and clean
format = """$username$hostname$directory$git_branch$git_status$fill$nodejs$python$rust$golang$java$cmd_duration$line_break$character"""

[fill]
symbol = " "

[character]
success_symbol = "[//](bold #78A9FF)"
error_symbol = "[//](bold #EE5396)"

[username]
style_user = "bold #BE95FF"
style_root = "bold #EE5396"
format = "\\[$user\\]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #78A9FF"

[directory]
style = "bold #78A9FF"
format = "[> $path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "../"

[git_branch]
symbol = "//"
style = "bold #42BE65"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold #EE5396"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "!!"
untracked = "++"
ahead = "↑${count}"
behind = "↓${count}"
modified = "**"
staged = "##"
deleted = "xx"

[nodejs]
symbol = "⬡"
style = "bold #42BE65"
format = "[$symbol $version]($style) "

[python]
symbol = "🐍"
style = "bold #BE95FF"
format = "[$symbol $version]($style) "

[rust]
symbol = "⚙"
style = "bold #EE5396"
format = "[$symbol $version]($style) "

[golang]
symbol = "◈"
style = "bold #08BDBA"
format = "[$symbol $version]($style) "

[java]
symbol = "☕"
style = "bold #EE5396"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style)"
style = "bold #525252"
